<div class="maincontainer">
    <div *ngIf="!isOwner" class="left">
        <p>{{chatReply.user.name}} :</p>
    </div>
    <div class="content" [ngStyle]="{'text-align': isOwner ? 'right' : 'left'}">
        <ng-container *ngIf="chatReply.type === 'text'">
            <p>{{chatReply.message}}</p>
        </ng-container>
    </div>
    <div *ngIf="isOwner" class="right">
        <p>: Saya</p>
    </div>
</div>
